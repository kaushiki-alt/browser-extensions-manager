<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="index.css">
  <script type="module" src="/index.js"></script>

  <title>Frontend Mentor | Browser extensions manager UI</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body class="light">

  <main class="app">
    <header class="header">
      <img src="/assets/images/logo.svg" alt="logo" class="logo">
      <button class="theme">
        <img src="/assets/images/icon-sun.svg" alt='dark-theme' class="dark-theme">
      </button>
    </header>

    <section class="menu">
      <h2>Extensions List</h2>

      <div class="status-btns">
        <button class="status all activebtn"> All</button>
        <button class="status active"> Active</button>
        <button class="status inactive"> Inactive</button>
      </div>
    </section>

    <section id="extensions-container">

    </section>
    <!-- <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Kaushiki</a>.
    </div> -->

  </main>

</body>

</html>
